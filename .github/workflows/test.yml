name: Test (Robolectric — без емулятора)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "PICOVOICE_KEY=" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Run Robolectric tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace --info 2>&1 | tee artifacts/raw-test-output.txt
        continue-on-error: true

      - name: Collect results
        if: always()
        run: |
          mkdir -p artifacts
          # XML-звіти
          find app/build/test-results -name "*.xml" -exec cp {} artifacts/ \; 2>/dev/null || true
          # Stacktrace-и
          find app/build/reports -type f -name "*.html" -exec cp {} artifacts/ \; 2>/dev/null || true
          # Якщо попередній крок впав, гарантуємо що хоч щось буде в артефактах
          if [ -f artifacts/raw-test-output.txt ]; then
            cp artifacts/raw-test-output.txt artifacts/raw-test-output.txt || true
          fi
          ls -la artifacts/ || true
          echo "--- DONE ---"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: totoro-test-artifacts
          path: artifacts/
          if-no-files-found: warn
